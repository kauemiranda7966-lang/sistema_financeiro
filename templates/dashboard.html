{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Dashboard</h2>

<div class="alert alert-success">
    <strong>Total:</strong> R$ {{ total }}
</div>

<form action="/add" method="POST" class="row g-2 mb-4">
    <div class="col-md-5">
        <input type="text" name="nome" class="form-control" placeholder="Nome" required>
    </div>
    <div class="col-md-3">
        <input type="number" step="0.01" name="valor" class="form-control" placeholder="Valor" required>
    </div>
    <div class="col-md-2">
        <button class="btn btn-primary w-100">Adicionar</button>
    </div>
</form>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Nome</th>
            <th>Valor</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
        {% if gastos %}
            {% for gasto in gastos %}
            <tr>
                <td>{{ gasto[1] }}</td>
                <td>R$ {{ gasto[2] }}</td>
                <td>
                    <a href="/edit/{{ gasto[0] }}" class="btn btn-warning btn-sm">Editar</a>
                    <a href="/delete/{{ gasto[0] }}" class="btn btn-danger btn-sm">Deletar</a>
                </td>
            </tr>
            {% endfor %}
        {% else %}
            <tr>
                <td colspan="3" class="text-center text-muted">
                    Nenhum gasto cadastrado
                </td>
            </tr>
        {% endif %}
    </tbody>
</table>

{% endblock %}
