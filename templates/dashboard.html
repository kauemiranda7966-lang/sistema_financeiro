{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<h2>Seus Gastos</h2>

<form action="/add" method="POST">
    <input type="text" name="nome" placeholder="Nome do gasto" required>
    <input type="number" step="0.01" name="valor" placeholder="Valor" required>
    <button type="submit">Adicionar</button>
</form>

<hr>

{% if gastos %}
    <ul>
        {% for gasto in gastos %}
            <li>
                {{ gasto[1] }} - R$ {{ gasto[2] }}
                <a href="/delete/{{ gasto[0] }}">❌</a>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>Nenhum gasto cadastrado.</p>
{% endif %}

{% endblock %}
