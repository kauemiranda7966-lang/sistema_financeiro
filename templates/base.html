<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sistema Financeiro{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">💰 Sistema Financeiro</span>

    {% if session.usuario_id %}
        <div>
            <a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a>
            <a href="/logout" class="btn btn-danger btn-sm">Sair</a>
        </div>
    {% endif %}
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
