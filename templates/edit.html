{% extends "base.html" %}

{% block content %}

<h2>Editar Gasto</h2>

<form method="POST">
    <input type="text" name="nome" value="{{ gasto[1] }}" required>
    <input type="number" step="0.01" name="valor" value="{{ gasto[2] }}" required>
    
    <button type="submit">Salvar</button>
</form>

<a href="/dashboard">Voltar</a>

{% endblock %}
